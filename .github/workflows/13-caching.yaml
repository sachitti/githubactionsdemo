name: 13-caching

on:
  workflow_dispatch:
    inputs:
      use-cache:  
        description: Whether to execute cache step  
        type: boolean
        default: true
jobs:
  build:
    runs-on: ubuntu-latest
    defaults: 
      run:
        working-directory: 13-caching/react-app  
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: node setup
        uses: actions/setup-node
        with:  
          node-version: '20.x' 
      - name: Install dependencies
        run: npm ci         
      - name: npm run test
        run: nmp run test        
      - name: npm build
        run: npm run build  
      - name: deploying to nonprod
        run: echo "deploing on nonprod"    
